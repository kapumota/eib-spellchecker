# Configuracion de EIB Spellchecker.
# Archivo YAML usado para parametros, ejecucion, evaluacion o entrenamiento del proyecto.

language: demo
alphabet: latin
normalize:
  lowercase: true
  strip_accents: false
data:
  corpus_files:
    - ../examples/demo_corpus.txt
lexical:
  min_frequency: 1
  max_vocabulary_size: 50000
  min_correction_length: 3
  similarity_threshold: 0.7
subword:
  enabled: true
  min_frequency: 1
  max_vocabulary_size: 50000
  min_correction_length: 3
  jaccard_weight: 0.52
  edit_weight: 0.33
  frequency_weight: 0.15
  score_threshold: 0.56
  max_candidates: 16
  min_ngram: 2
  max_ngram: 4
safety_policy:
  enabled: true
  protect_title_case: true
  protect_all_caps: true
  proper_name_threshold: 0.9
  loanword_threshold: 0.92
  out_of_domain_threshold: 0.93
  abstain_margin: 0.08
  max_unknown_char_ratio: 0.35
  min_known_char_coverage: 0.45
  score_boost_for_identity: 0.03
  loanword_chars: "fwzqxvk"

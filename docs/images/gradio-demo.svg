<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="640" viewBox="0 0 1160 640" role="img" aria-labelledby="title desc">
  <title id="title">Demo visual de eib-spellchecker</title>
  <desc id="desc">Plataforma Gradio con entrada, salida, cambios detectados y graficos.</desc>
  <rect width="1160" height="640" rx="28" fill="#f6f8fb"/>
  <rect x="32" y="32" width="1096" height="576" rx="24" fill="#ffffff" stroke="#d9e0ea"/>
  <text x="72" y="86" font-family="Arial" font-size="30" font-weight="700" fill="#1f2937">eib-spellchecker demo</text>
  <text x="72" y="120" font-family="Arial" font-size="16" fill="#4b5563">Backend subword con resumen visual de correcciones</text>
  <rect x="72" y="162" width="460" height="148" rx="16" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="96" y="198" font-family="Arial" font-size="18" font-weight="700" fill="#111827">Texto de entrada</text>
  <text x="96" y="242" font-family="Arial" font-size="24" fill="#374151">jakn nete</text>
  <rect x="72" y="342" width="460" height="148" rx="16" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="96" y="378" font-family="Arial" font-size="18" font-weight="700" fill="#111827">Texto corregido</text>
  <text x="96" y="422" font-family="Arial" font-size="24" fill="#047857">jakon nete</text>
  <rect x="580" y="162" width="230" height="328" rx="16" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="604" y="198" font-family="Arial" font-size="18" font-weight="700" fill="#111827">Cambios</text>
  <rect x="604" y="228" width="180" height="82" rx="10" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="620" y="260" font-family="Arial" font-size="14" fill="#374151">original: jakn</text>
  <text x="620" y="286" font-family="Arial" font-size="14" fill="#374151">corrected: jakon</text>
  <rect x="850" y="162" width="230" height="328" rx="16" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="874" y="198" font-family="Arial" font-size="18" font-weight="700" fill="#111827">Grafico</text>
  <line x1="890" y1="430" x2="1040" y2="430" stroke="#9ca3af" stroke-width="2"/>
  <line x1="890" y1="250" x2="890" y2="430" stroke="#9ca3af" stroke-width="2"/>
  <rect x="924" y="310" width="42" height="120" rx="6" fill="#93c5fd"/>
  <rect x="990" y="370" width="42" height="60" rx="6" fill="#86efac"/>
  <text x="900" y="462" font-family="Arial" font-size="12" fill="#374151">Conservados</text>
  <text x="982" y="462" font-family="Arial" font-size="12" fill="#374151">Corregidos</text>
  <rect x="72" y="534" width="1008" height="42" rx="12" fill="#ecfeff" stroke="#bae6fd"/>
  <text x="96" y="560" font-family="Arial" font-size="15" fill="#155e75">La demo puede cargar reportes JSON para graficar CER y vocabulario abierto.</text>
</svg>
